<div class="santa-maria-area-container col-12 d-flex justify-content-center align-items-center">
    <div class="center-box col-12 d-flex justify-content-center align-items-center">
        <div class="image-container col-4 d-flex justify-content-center align-items-center">
            <img src="assets\images\hogar.webp" class="img">
        </div>
        <div class="left-data col-8">
            <div class="tittle-container col d-flex align-items-center justify-content-center">
                <h1 class="area-title">Hogar Santa María</h1>
            </div>
            <div class="form col d-flex align-items-center justify-content-center">
                <div class="form-container">
                </div>
            </div>
            <app-area-statistics [tipoEstructura]="tipoEstructura" [nombreArea]="nombreArea"></app-area-statistics>
            <div class="button-container col d-flex justify-content-center align-items-center">
                <button type="button" class="btn btn-lg" routerLink="/home/area-hogar-santa-maria">
                    <i class="bi"></i>
                    Ir al área
                </button>
            </div>  
        </div>
    </div>
</div>
