<div class="col-12 align-items-center justify-content-center">
    <div class="top-image-container">
        <app-area-top-image
        imageSrc="assets\images\servicio.webp"
        text="Servicio y Atención al Usuario">
        </app-area-top-image>
    </div>
    <div class="area-buttons-container">
        <app-area-buttons
        tipoEstructura="area"
        nombreEstructura="Servicio y atención al usuario"
        [buttons]="[
            { text: 'Ver Resumen', icon: 'bi bi-clipboard-data', scrollTarget: 'servicio-filters-section' },
            { text: 'Generar Informes', icon: 'bi bi-journal-plus', action: 'generarInforme' }]">
        </app-area-buttons>
    </div>
    <div class="activities-container">
        <app-activities></app-activities>
    </div>
    <div id="servicio-filters-section" class="area-filters-container">
        <app-area-filters (filtersChanged)="onFiltersChanged($event)"></app-area-filters>
    </div>
    <div class="top-data-container">
        <app-top-data-container [filtersRequest]="filtersRequest"></app-top-data-container>
    </div>
    <div class="botton-data-container">
        <app-bottom-data-container [filtersRequest]="filtersRequest"></app-bottom-data-container>
    </div>
</div>
