<span *ngIf="modalTargetId && disabled" [title]="disabledTooltip">
  <button class="btn btn-primary d-inline-flex align-items-center gap-2 px-3 py-2" disabled>
    <i [class]="icon + ' fs-2'"></i>
    <span>{{ text }}</span>
  </button>
</span>
<button *ngIf="modalTargetId && !disabled" href="#" class="btn btn-primary d-inline-flex align-items-center gap-2 px-3 py-2"
   (click)="openModal(modalTargetId)">
  <i [class]="icon + ' fs-2'"></i>
  <span>{{ text }}</span>
</button>
