<div class="left-data-container">
    <div class="title-container col d-flex justify-content-center align-items-center">
        <h1 class="left-data-title">Actividades realizadas</h1>
    </div>

    <div class="data-image-container row justify-content-center align-items-center">
        <div class="img-container col-5 d-flex justify-content-center">
            <img [src]="imageUrl" alt="Grupo de personas" class="img-fluid" />
        </div>

        <div class="data-container col-7">
            <div class="cuantity-container col d-flex align-items-center justify-content-center">
                <p class="cuantity">{{ totalActividades }}</p>
            </div>
            <div class="form-container col d-flex align-items-center justify-content-center">
                <form class="separator"></form>
            </div>
        </div>
    </div>
</div>
