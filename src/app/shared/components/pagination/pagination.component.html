<div class="d-flex justify-content-between align-items-center mt-3" *ngIf="totalElementos > 0">
  <small class="text-muted">
    Mostrando {{ inicio }}-{{ fin }} de {{ totalElementos }} registros
  </small>

  <nav aria-label="Paginación">
    <ul class="pagination mb-0">
      <li class="page-item" [class.disabled]="paginaActual === 0">
        <a class="page-link" (click)="anterior()" role="button" aria-label="Anterior">
          &laquo;
        </a>
      </li>
      <ng-container *ngFor="let pagina of paginas">
        <li *ngIf="pagina === '...'" class="page-item disabled">
          <span class="page-link">&hellip;</span>
        </li>
        <li *ngIf="pagina !== '...'" class="page-item" [class.active]="pagina === paginaActual">
          <a class="page-link" (click)="irAPagina(+pagina)" role="button">
            {{ +pagina + 1 }}
          </a>
        </li>
      </ng-container>
      <li class="page-item" [class.disabled]="paginaActual === totalPaginas - 1">
        <a class="page-link" (click)="siguiente()" role="button" aria-label="Siguiente">
          &raquo;
        </a>
      </li>
    </ul>
  </nav>
</div>
